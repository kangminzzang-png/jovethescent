<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOVE — Order Complete</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: hsl(0,0%,5%); --fg: hsl(40,10%,85%); --card: hsl(0,0%,8%); --muted: hsl(40,5%,55%); --border: hsl(0,0%,15%); --gold: hsl(43,35%,50%); --serif: 'Cormorant Garamond', Georgia, serif; --sans: -apple-system, 'Segoe UI', system-ui, sans-serif; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--fg); font-family: var(--sans); -webkit-font-smoothing: antialiased; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
  h1,h2 { font-family: var(--serif); font-weight: 400; }
  a { color: inherit; text-decoration: none; }
  img { display: block; max-width: 100%; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; display: flex; align-items: center; justify-content: center; padding: 1.25rem 3rem; background: rgba(13,13,13,0.8); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(196,169,106,0.06); }
  .nav-logo img { height: 22px; filter: invert(1); opacity: 0.85; }

  .complete { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 8rem 2rem 4rem; max-width: 600px; margin: 0 auto; }
  .complete-icon { font-size: 3rem; margin-bottom: 2rem; opacity: 0; animation: fadeUp 1s ease 0.3s forwards; }
  .complete h1 { font-size: clamp(1.8rem, 4vw, 2.5rem); margin-bottom: 1rem; opacity: 0; animation: fadeUp 1s ease 0.5s forwards; }
  .complete p { color: var(--muted); font-size: 0.9rem; line-height: 1.8; margin-bottom: 0.5rem; opacity: 0; animation: fadeUp 1s ease 0.7s forwards; }
  .complete-order-id { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--gold); margin: 2rem 0; padding: 0.8rem 2rem; border: 1px solid var(--border); opacity: 0; animation: fadeUp 1s ease 0.9s forwards; }
  .complete-actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-top: 2rem; opacity: 0; animation: fadeUp 1s ease 1.1s forwards; }
  .complete-actions a { padding: 0.8rem 2.5rem; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; transition: all 0.3s; }
  .complete-actions .btn-primary { background: var(--fg); color: var(--bg); border: 1px solid var(--fg); }
  .complete-actions .btn-primary:hover { background: var(--gold); border-color: var(--gold); }
  .complete-actions .btn-outline { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .complete-actions .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

  footer { border-top: 1px solid var(--border); padding: 3rem 2rem; display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 0 auto; width: 100%; }
  footer img { height: 18px; filter: invert(1); opacity: 0.4; }
  footer span { font-size: 0.5rem; color: rgba(221,218,213,0.15); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<nav>
  <a href="./" class="nav-logo"><img src="../assets/lovable/logo-jove.png" alt="JOVE"></a>
</nav>

<div class="complete">
  <div class="complete-icon">✦</div>
  <h1>Order Confirmed</h1>
  <p>Your JOVE fragrance is being prepared for delivery.</p>
  <p>A confirmation email has been sent to your inbox.</p>
  <div class="complete-order-id" id="orderId"></div>
  <div class="complete-actions">
    <a href="./" class="btn-primary">Home</a>
    <a href="./#collection" class="btn-outline">View Collection</a>
  </div>
</div>

<footer>
  <a href="./"><img src="../assets/lovable/logo-jove.png" alt="JOVE"></a>
  <span>© 2026 JOVE</span>
</footer>

<script src="../js/cart.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get('orderId') || 'JOVE-' + Date.now().toString(36).toUpperCase();
  document.getElementById('orderId').textContent = 'Order: ' + orderId;
  JoveCart.clearCart();
</script>
</body>
</html>
