<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOVE — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #050505; --fg: #F5F5F0; --card: hsl(0,0%,8%);
    --muted: #A0A0A0; --border: hsl(0,0%,18%);
    --gold: hsl(43,35%,50%); --obsidian: #050505;
    --serif: 'Cormorant Garamond', serif;
    --sans: 'Pretendard', -apple-system, system-ui, sans-serif;
    --danger: hsl(0,55%,55%); --success: hsl(140,50%,45%);
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--muted); font-family: var(--sans); font-weight: 300; -webkit-font-smoothing: antialiased; line-height: 1.7; min-height: 100vh; }
  a { color: inherit; text-decoration: none; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; display: flex; align-items: center; justify-content: center; padding: 1.25rem 1.5rem; background: linear-gradient(to bottom, rgba(13,13,13,0.95), rgba(13,13,13,0.8)); backdrop-filter: blur(12px); }
  .nav-logo img { height: 24px; width: auto; filter: invert(1); opacity: 0.9; }
  .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 6rem 1.5rem 3rem; }
  .auth-card { width: 100%; max-width: 400px; background: var(--card); border: 1px solid var(--border); padding: 3rem 2.5rem; }
  @media(max-width:500px) { .auth-card { padding: 2.5rem 1.5rem; } }
  .auth-header { text-align: center; margin-bottom: 2.5rem; }
  .auth-symbol { font-size: 0.7rem; letter-spacing: 0.5em; color: var(--gold); margin-bottom: 1rem; }
  .auth-title { font-family: var(--serif); font-weight: 300; font-size: 1.8rem; color: var(--fg); margin-bottom: 0.5rem; letter-spacing: 0.1em; }
  .auth-subtitle { font-size: 0.8rem; color: var(--muted); }
  .form-group { margin-bottom: 1.25rem; }
  .form-label { display: block; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
  .form-input { width: 100%; padding: 0.85rem 1rem; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--fg); font-family: var(--sans); font-size: 0.85rem; outline: none; transition: border-color 0.3s; }
  .form-input:focus { border-color: var(--gold); }
  .form-input::placeholder { color: rgba(221,218,213,0.15); }
  .form-error { font-size: 0.75rem; color: var(--danger); margin-top: 0.4rem; display: none; }
  .form-error.visible { display: block; }
  .form-submit { width: 100%; padding: 0.9rem; margin-top: 0.5rem; background: var(--fg); color: var(--bg); border: 1px solid var(--fg); font-family: var(--sans); font-size: 0.7rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: all 0.4s; }
  .form-submit:hover { background: var(--gold); border-color: var(--gold); color: var(--obsidian); }
  .form-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .form-submit.loading { pointer-events: none; opacity: 0.7; }
  .auth-divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; color: rgba(221,218,213,0.15); font-size: 0.65rem; letter-spacing: 0.1em; }
  .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .social-buttons { display: flex; flex-direction: column; gap: 0.75rem; }
  .social-btn { width: 100%; padding: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 0.6rem; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: var(--sans); font-size: 0.75rem; letter-spacing: 0.05em; cursor: pointer; transition: all 0.3s; }
  .social-btn:hover { border-color: rgba(221,218,213,0.3); color: var(--fg); }
  .social-btn svg { width: 18px; height: 18px; }
  .auth-links { margin-top: 2rem; text-align: center; }
  .auth-links a { font-size: 0.75rem; color: var(--muted); transition: color 0.3s; }
  .auth-links a:hover { color: var(--gold); }
  .auth-message { padding: 0.8rem 1rem; margin-bottom: 1.5rem; font-size: 0.8rem; border: 1px solid; display: none; }
  .auth-message.error { border-color: var(--danger); color: var(--danger); background: rgba(180,50,50,0.05); }
  .auth-message.success { border-color: var(--success); color: var(--success); background: rgba(50,150,80,0.05); }
  .auth-message.visible { display: block; }
  .forgot-link { display: block; text-align: right; margin-top: -0.5rem; margin-bottom: 1rem; }
  .forgot-link a { font-size: 0.7rem; color: var(--muted); transition: color 0.3s; }
  .forgot-link a:hover { color: var(--gold); }
  .noise { position: fixed; inset: 0; opacity: 0.02; pointer-events: none; z-index: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size: 256px; }
</style>
</head>
<body>
<div class="noise"></div>
<nav><a href="./" class="nav-logo"><img src="../assets/lovable/logo-jove.png" alt="JOVE"></a></nav>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-symbol">✦</div>
      <h1 class="auth-title">Sign In</h1>
      <p class="auth-subtitle">Welcome to JOVE Membership</p>
    </div>
    <div class="auth-message" id="authMessage"></div>
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="email" placeholder="your@email.com" required autocomplete="email">
        <div class="form-error" id="emailError"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="password" placeholder="Enter password" required autocomplete="current-password">
        <div class="form-error" id="passwordError"></div>
      </div>
      <div class="forgot-link"><a href="forgot-password.html">Forgot password?</a></div>
      <button type="submit" class="form-submit" id="submitBtn">Sign In</button>
    </form>
    <div class="auth-divider">or</div>
    <div class="social-buttons">
      <button class="social-btn" id="googleBtn">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </div>
    <div class="auth-links">
      <p>Don't have an account? <a href="signup.html" style="color:var(--gold)">Sign Up</a></p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('authMessage');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  msg.className = 'auth-message';
  document.querySelectorAll('.form-error').forEach(el => { el.className = 'form-error'; el.textContent = ''; });
  if (!email) { show('emailError', 'Please enter your email.'); return; }
  if (!password) { show('passwordError', 'Please enter your password.'); return; }
  btn.textContent = 'Signing in...'; btn.classList.add('loading');
  const { data, error } = await JoveAuth.signIn(email, password);
  btn.textContent = 'Sign In'; btn.classList.remove('loading');
  if (error) { msg.textContent = error.message === 'Invalid login credentials' ? 'Invalid email or password.' : error.message; msg.className = 'auth-message error visible'; return; }
  const params = new URLSearchParams(window.location.search);
  window.location.href = params.get('redirect') || './';
});
document.getElementById('googleBtn').addEventListener('click', async () => {
  const msg = document.getElementById('authMessage');
  const { error } = await JoveAuth.signInWithProvider('google');
  if (error) { msg.textContent = error.message; msg.className = 'auth-message error visible'; }
});
JoveAuth.getUser && JoveAuth.getUser().then(user => { if (user) window.location.href = 'mypage.html'; });
const urlMsg = new URLSearchParams(window.location.search).get('message');
if (urlMsg) { const m = document.getElementById('authMessage'); m.textContent = decodeURIComponent(urlMsg); m.className = 'auth-message success visible'; }
function show(id, text) { const el = document.getElementById(id); el.textContent = text; el.className = 'form-error visible'; }
</script>
</body>
</html>
