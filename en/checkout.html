<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOVE — Checkout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<!-- Stripe -->
<script src="https://js.stripe.com/v3/"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: hsl(0,0%,5%); --fg: hsl(40,10%,85%); --card: hsl(0,0%,8%);
    --muted: hsl(40,5%,55%); --border: hsl(0,0%,15%);
    --gold: hsl(43,35%,50%); --obsidian: hsl(0,0%,4%);
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: -apple-system, 'Segoe UI', system-ui, sans-serif;
    --danger: hsl(0,60%,50%);
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--fg); font-family: var(--sans); -webkit-font-smoothing: antialiased; line-height: 1.6; }
  h1,h2,h3 { font-family: var(--serif); font-weight: 400; }
  img { display: block; max-width: 100%; }
  a { color: inherit; text-decoration: none; }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.25rem 3rem; background: rgba(13,13,13,0.8);
    backdrop-filter: blur(16px); border-bottom: 1px solid rgba(196,169,106,0.06);
  }
  .nav-logo img { height: 22px; filter: invert(1); opacity: 0.85; }
  .nav-links { display: flex; gap: 1.5rem; align-items: center; }
  .nav-links a { font-size: 0.65rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; transition: color 0.3s; }
  .nav-links a:hover { color: var(--fg); }

  .checkout-wrapper {
    max-width: 1000px; margin: 0 auto; padding: 7rem 2rem 4rem;
    display: grid; gap: 3rem;
  }
  @media(min-width:768px) { .checkout-wrapper { grid-template-columns: 1fr 380px; gap: 4rem; } }

  .checkout-title { font-family: var(--serif); font-size: 2rem; margin-bottom: 0.5rem; grid-column: 1 / -1; }
  .checkout-back { font-size: 0.6rem; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 2rem; display: inline-block; grid-column: 1 / -1; transition: color 0.3s; }
  .checkout-back:hover { color: var(--gold); }

  .section-title { font-size: 0.65rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.5rem; padding-bottom: 0.8rem; border-bottom: 1px solid var(--border); }

  .form-row { margin-bottom: 1.2rem; }
  .form-row label { display: block; font-size: 0.65rem; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; }
  .form-row input, .form-row select { width: 100%; padding: 0.8rem 1rem; background: var(--card); border: 1px solid var(--border); color: var(--fg); font-family: var(--sans); font-size: 0.85rem; transition: border-color 0.3s; outline: none; }
  .form-row input:focus, .form-row select:focus { border-color: var(--gold); }
  .form-row input::placeholder { color: rgba(221,218,213,0.2); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-row.full { grid-column: 1 / -1; }

  .order-summary { background: var(--card); border: 1px solid var(--border); padding: 2rem; position: sticky; top: 6rem; align-self: start; }

  .summary-item { display: flex; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid var(--border); }
  .summary-item:last-of-type { border-bottom: none; }
  .summary-item-img { width: 60px; height: 75px; overflow: hidden; flex-shrink: 0; background: var(--obsidian); }
  .summary-item-img img { width: 100%; height: 100%; object-fit: cover; }
  .summary-item-info { flex: 1; }
  .summary-item-name { font-family: var(--serif); font-size: 0.95rem; margin-bottom: 0.2rem; }
  .summary-item-meta { font-size: 0.65rem; color: var(--muted); }
  .summary-item-price { font-size: 0.85rem; white-space: nowrap; }
  .summary-item-qty { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.3rem; }
  .qty-btn { background: none; border: 1px solid var(--border); color: var(--muted); width: 22px; height: 22px; cursor: pointer; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
  .qty-btn:hover { border-color: var(--gold); color: var(--gold); }
  .qty-val { font-size: 0.8rem; min-width: 18px; text-align: center; }
  .summary-item-remove { font-size: 0.55rem; color: var(--muted); cursor: pointer; text-decoration: underline; margin-top: 0.3rem; transition: color 0.3s; background: none; border: none; font-family: var(--sans); }
  .summary-item-remove:hover { color: var(--danger); }

  .promo-row { display: flex; gap: 0; margin: 1rem 0; border: 1px solid var(--border); }
  .promo-row input { flex: 1; padding: 0.7rem 1rem; background: transparent; border: none; color: var(--fg); font-size: 0.8rem; font-family: var(--sans); outline: none; }
  .promo-row input::placeholder { color: rgba(221,218,213,0.2); }
  .promo-row button { padding: 0.7rem 1.5rem; background: var(--fg); color: var(--bg); border: none; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: background 0.3s; font-family: var(--sans); }
  .promo-row button:hover { background: var(--gold); }
  .promo-result { font-size: 0.7rem; margin-top: 0.5rem; min-height: 1.2rem; }
  .promo-result.success { color: var(--gold); }
  .promo-result.error { color: var(--danger); }

  .summary-totals { padding-top: 1rem; border-top: 1px solid var(--border); margin-top: 0.5rem; }
  .summary-line { display: flex; justify-content: space-between; margin-bottom: 0.6rem; font-size: 0.8rem; }
  .summary-line.discount { color: var(--gold); }
  .summary-line.total { font-family: var(--serif); font-size: 1.4rem; padding-top: 0.8rem; border-top: 1px solid var(--border); margin-top: 0.8rem; }

  .btn-pay { display: block; width: 100%; padding: 1rem; margin-top: 1.5rem; background: var(--fg); color: var(--bg); font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; border: none; cursor: pointer; transition: all 0.5s; font-family: var(--sans); }
  .btn-pay:hover { background: var(--gold); }
  .btn-pay:disabled { opacity: 0.4; cursor: not-allowed; }
  .pay-note { font-size: 0.6rem; color: var(--muted); text-align: center; margin-top: 1rem; line-height: 1.6; }

  .empty-cart { text-align: center; padding: 4rem 0; grid-column: 1 / -1; }
  .empty-cart h2 { font-size: 1.5rem; margin-bottom: 1rem; }
  .empty-cart p { color: var(--muted); margin-bottom: 2rem; }
  .empty-cart a { display: inline-block; padding: 0.8rem 2.5rem; border: 1px solid var(--border); font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); transition: all 0.3s; }
  .empty-cart a:hover { border-color: var(--gold); color: var(--gold); }

  footer { border-top: 1px solid var(--border); padding: 3rem 2rem; display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 3rem auto 0; }
  footer img { height: 18px; filter: invert(1); opacity: 0.4; }
  footer span { font-size: 0.5rem; color: rgba(221,218,213,0.15); }

  @media(max-width:767px) {
    nav { padding: 1rem 1.5rem; }
    .checkout-wrapper { padding: 6rem 1.5rem 3rem; }
    .form-grid { grid-template-columns: 1fr; }
    .order-summary { position: static; }
  }
</style>
</head>
<body>

<nav>
  <a href="./" class="nav-logo"><img src="../assets/lovable/logo-jove.png" alt="JOVE"></a>
  <div class="nav-links">
    <a href="./#collection">Collection</a>
    <a href="./">Home</a>
  </div>
</nav>

<div class="checkout-wrapper" id="checkoutWrapper">
  <a href="./" class="checkout-back">← Continue Shopping</a>
  <h1 class="checkout-title">Checkout</h1>

  <div class="checkout-form" id="checkoutForm">
    <div class="section-title">Shipping Information</div>
    <div class="form-grid">
      <div class="form-row">
        <label>First Name</label>
        <input type="text" id="firstName" placeholder="John" required>
      </div>
      <div class="form-row">
        <label>Last Name</label>
        <input type="text" id="lastName" placeholder="Doe" required>
      </div>
      <div class="form-row full">
        <label>Email</label>
        <input type="email" id="email" placeholder="john@example.com" required>
      </div>
      <div class="form-row full">
        <label>Address</label>
        <input type="text" id="address" placeholder="123 Main Street" required>
      </div>
      <div class="form-row full">
        <label>Apartment, suite, etc. (optional)</label>
        <input type="text" id="address2" placeholder="Apt 4B">
      </div>
      <div class="form-row">
        <label>City</label>
        <input type="text" id="city" placeholder="New York" required>
      </div>
      <div class="form-row">
        <label>Country</label>
        <select id="country">
          <option value="US">United States</option>
          <option value="GB">United Kingdom</option>
          <option value="JP">Japan</option>
          <option value="SG">Singapore</option>
          <option value="AU">Australia</option>
          <option value="CA">Canada</option>
          <option value="DE">Germany</option>
          <option value="FR">France</option>
          <option value="OTHER">Other</option>
        </select>
      </div>
      <div class="form-row">
        <label>State / Province</label>
        <input type="text" id="state" placeholder="NY">
      </div>
      <div class="form-row">
        <label>ZIP / Postal Code</label>
        <input type="text" id="zip" placeholder="10001" required>
      </div>
    </div>
  </div>

  <div class="order-summary" id="orderSummary">
    <div class="section-title">Order Summary</div>
    <div id="summaryItems"></div>

    <div style="margin-top:1rem">
      <div class="promo-row">
        <input type="text" id="promoInput" placeholder="Invitation code">
        <button id="promoBtn">Apply</button>
      </div>
      <div class="promo-result" id="promoResult"></div>
    </div>

    <div class="summary-totals" id="summaryTotals"></div>

    <button class="btn-pay" id="payBtn" onclick="processPayment()">Place Order</button>
    <div class="pay-note">
      Secure checkout.<br>
      Visa / Mastercard / Amex / Apple Pay / Google Pay
    </div>
  </div>
</div>

<div class="empty-cart" id="emptyCart" style="display:none">
  <h2>Your cart is empty</h2>
  <p>Discover the scents of JOVE.</p>
  <a href="./#collection">View Collection</a>
</div>

<footer>
  <a href="./"><img src="../assets/lovable/logo-jove.png" alt="JOVE"></a>
  <span>© 2026 JOVE</span>
</footer>

<script src="../js/cart.js"></script>
<script>
  function renderSummary() {
    const cart = JoveCart.getCart();
    if (cart.length === 0) {
      document.getElementById('checkoutWrapper').style.display = 'none';
      document.getElementById('emptyCart').style.display = 'block';
      return;
    }

    const itemsEl = document.getElementById('summaryItems');
    itemsEl.innerHTML = cart.map(item => `
      <div class="summary-item">
        <div class="summary-item-img"><img src="${item.image}" alt="${item.nameEn}"></div>
        <div class="summary-item-info">
          <div class="summary-item-name">${item.nameEn}</div>
          <div class="summary-item-meta">${item.subtitle}</div>
          <div class="summary-item-qty">
            <button class="qty-btn" onclick="JoveCart.updateQuantity('${item.id}',${item.quantity-1});renderSummary()">−</button>
            <span class="qty-val">${item.quantity}</span>
            <button class="qty-btn" onclick="JoveCart.updateQuantity('${item.id}',${item.quantity+1});renderSummary()">+</button>
          </div>
          <button class="summary-item-remove" onclick="JoveCart.remove('${item.id}');renderSummary()">Remove</button>
        </div>
        <div class="summary-item-price">${JoveCart.formatUSD(item.priceUsd * item.quantity)}</div>
      </div>
    `).join('');

    renderTotals();
  }

  function renderTotals() {
    const subtotal = JoveCart.getCartSubtotal('usd');
    const promo = JoveCart.getAppliedPromo();
    const total = JoveCart.getCartTotal('usd');
    const shipping = subtotal >= 80 ? 0 : 15;
    const finalTotal = total + shipping;

    let html = `
      <div class="summary-line">
        <span style="color:var(--muted)">Subtotal</span>
        <span>${JoveCart.formatUSD(subtotal)}</span>
      </div>
    `;
    if (promo) {
      const discountAmount = subtotal - total;
      html += `<div class="summary-line discount"><span>Discount (${promo.code})</span><span>-${JoveCart.formatUSD(discountAmount)}</span></div>`;
    }
    html += `
      <div class="summary-line">
        <span style="color:var(--muted)">Shipping</span>
        <span>${shipping === 0 ? 'Free' : JoveCart.formatUSD(shipping)}</span>
      </div>
      <div class="summary-line total"><span>Total</span><span>${JoveCart.formatUSD(finalTotal)}</span></div>
    `;
    document.getElementById('summaryTotals').innerHTML = html;
  }

  document.getElementById('promoBtn').addEventListener('click', () => {
    const input = document.getElementById('promoInput');
    const result = document.getElementById('promoResult');
    const promo = JoveCart.applyPromo(input.value);
    if (promo) {
      result.textContent = promo.msgEn;
      result.className = 'promo-result success';
      renderTotals();
    } else {
      result.textContent = 'Invalid invitation code.';
      result.className = 'promo-result error';
    }
  });

  function processPayment() {
    const firstName = document.getElementById('firstName').value.trim();
    const lastName = document.getElementById('lastName').value.trim();
    const email = document.getElementById('email').value.trim();
    const address = document.getElementById('address').value.trim();
    const city = document.getElementById('city').value.trim();
    const zip = document.getElementById('zip').value.trim();

    if (!firstName || !lastName || !email || !address || !city || !zip) {
      alert('Please fill in all required fields.');
      return;
    }

    try {
      const stripe = Stripe('pk_test_PLACEHOLDER');
      // In production, this would call your backend to create a Checkout Session
      // For now, show a placeholder message
      alert('Payment system is being set up. Coming soon!');
      
      // Production flow would be:
      // fetch('/api/create-checkout-session', { method: 'POST', body: JSON.stringify({ cart, shipping }) })
      //   .then(res => res.json())
      //   .then(session => stripe.redirectToCheckout({ sessionId: session.id }));
    } catch(e) {
      alert('Payment system is being set up. Coming soon!');
      console.error(e);
    }
  }

  renderSummary();
  window.addEventListener('cart-updated', renderSummary);
</script>
</body>
</html>
