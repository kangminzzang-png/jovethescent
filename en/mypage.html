<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOVE — My Page</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #050505; --fg: #F5F5F0; --card: hsl(0,0%,8%); --muted: #A0A0A0; --border: hsl(0,0%,18%); --gold: hsl(43,35%,50%); --obsidian: #050505; --serif: 'Cormorant Garamond', serif; --sans: 'Pretendard', -apple-system, system-ui, sans-serif; --danger: hsl(0,55%,55%); --success: hsl(140,50%,45%); }
  body { background: var(--bg); color: var(--muted); font-family: var(--sans); font-weight: 300; -webkit-font-smoothing: antialiased; line-height: 1.7; min-height: 100vh; }
  a { color: inherit; text-decoration: none; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; background: rgba(13,13,13,0.97); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(196,169,106,0.06); }
  @media(min-width:768px){ nav { padding: 1.25rem 3rem; } }
  .nav-logo img { height: 24px; width: auto; filter: invert(1); opacity: 0.9; }
  .nav-right { display: flex; align-items: center; gap: 1.2rem; }
  .nav-right a, .nav-right button { font-size: 0.7rem; letter-spacing: 0.15em; color: var(--muted); background: none; border: none; cursor: pointer; transition: color 0.3s; text-transform: uppercase; }
  .nav-right a:hover, .nav-right button:hover { color: var(--fg); }
  .mypage { max-width: 800px; margin: 0 auto; padding: 6rem 1.5rem 4rem; }
  @media(min-width:768px) { .mypage { padding: 7rem 2rem 5rem; } }
  .mypage-header { text-align: center; margin-bottom: 3rem; }
  .mypage-symbol { margin-bottom: 1rem; }
  .mypage-symbol img { height: 32px; opacity: 0.5; }
  .mypage-greeting { font-family: var(--serif); font-weight: 300; font-size: 1.8rem; color: var(--fg); margin-bottom: 0.5rem; letter-spacing: 0.05em; }
  .mypage-tier { display: inline-block; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); border: 1px solid rgba(196,169,106,0.3); padding: 0.3rem 1rem; margin-top: 0.5rem; }
  .mypage-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 2.5rem; overflow-x: auto; }
  .mypage-tab { padding: 0.8rem 1.5rem; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.3s; white-space: nowrap; }
  .mypage-tab:hover { color: var(--fg); }
  .mypage-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .mypage-section { display: none; }
  .mypage-section.active { display: block; }
  .section-card { background: var(--card); border: 1px solid var(--border); padding: 2rem; margin-bottom: 1.5rem; }
  .section-card-title { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--fg); margin-bottom: 1.5rem; }
  .profile-grid { display: grid; gap: 1.25rem; }
  @media(min-width:600px) { .profile-grid { grid-template-columns: 1fr 1fr; } }
  .form-label { display: block; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
  .form-input { width: 100%; padding: 0.85rem 1rem; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--fg); font-family: var(--sans); font-size: 0.85rem; outline: none; transition: border-color 0.3s; }
  .form-input:focus { border-color: var(--gold); }
  .form-input:disabled { opacity: 0.5; }
  .form-input::placeholder { color: rgba(221,218,213,0.15); }
  .btn-save { padding: 0.8rem 2rem; background: var(--fg); color: var(--bg); border: 1px solid var(--fg); font-family: var(--sans); font-size: 0.65rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: all 0.4s; margin-top: 1rem; }
  .btn-save:hover { background: var(--gold); border-color: var(--gold); }
  .btn-save.loading { opacity: 0.7; pointer-events: none; }
  .save-result { font-size: 0.75rem; margin-top: 0.8rem; }
  .save-result.success { color: var(--success); }
  .save-result.error { color: var(--danger); }
  .orders-empty { text-align: center; padding: 3rem 1rem; }
  .orders-empty-icon { margin-bottom: 1rem; opacity: 0.3; }
  .orders-empty-icon img { height: 40px; }
  .orders-empty-text { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.5rem; }
  .orders-empty-cta { display: inline-block; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; padding: 0.7rem 2rem; border: 1px solid var(--border); color: var(--muted); transition: all 0.3s; }
  .orders-empty-cta:hover { border-color: var(--gold); color: var(--gold); }
  .address-empty { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.85rem; }
  .btn-add-address { display: inline-block; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; padding: 0.7rem 2rem; border: 1px solid var(--border); color: var(--muted); transition: all 0.3s; cursor: pointer; background: none; margin-top: 1rem; }
  .btn-add-address:hover { border-color: var(--gold); color: var(--gold); }
  .logout-section { text-align: center; margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border); }
  .btn-logout { padding: 0.7rem 2.5rem; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: var(--sans); font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.3s; }
  .btn-logout:hover { border-color: hsl(0,55%,55%); color: hsl(0,55%,55%); }
  .noise { position: fixed; inset: 0; opacity: 0.02; pointer-events: none; z-index: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size: 256px; }
</style>
</head>
<body>
<div class="noise"></div>
<nav>
  <a href="./" class="nav-logo"><img src="../assets/lovable/logo-jove.png" alt="JOVE"></a>
  <div class="nav-right">
    <a href="./">Home</a>
    <a href="../kr/mypage.html">KR</a>
  </div>
</nav>
<div class="mypage">
  <div class="mypage-header">
    <div class="mypage-symbol"><img src="images/lion-emblem-symbol.png" alt="JOVE"></div>
    <h1 class="mypage-greeting" id="greeting">Welcome</h1>
    <div class="mypage-tier">Basic Member</div>
  </div>
  <div class="mypage-tabs">
    <button class="mypage-tab active" data-tab="profile">Profile</button>
    <button class="mypage-tab" data-tab="orders">Orders</button>
    <button class="mypage-tab" data-tab="address">Addresses</button>
  </div>
  <div class="mypage-section active" id="tab-profile">
    <div class="section-card">
      <div class="section-card-title">Personal Information</div>
      <form id="profileForm">
        <div class="profile-grid">
          <div class="form-group"><label class="form-label">Name</label><input type="text" class="form-input" id="profileName" placeholder="Your name"></div>
          <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="profileEmail" disabled></div>
          <div class="form-group"><label class="form-label">Phone</label><input type="tel" class="form-input" id="profilePhone" placeholder="+1 (000) 000-0000"></div>
          <div class="form-group"><label class="form-label">Date of Birth</label><input type="date" class="form-input" id="profileBirth"></div>
        </div>
        <button type="submit" class="btn-save" id="saveProfileBtn">Save Changes</button>
        <div class="save-result" id="saveResult"></div>
      </form>
    </div>
    <div class="section-card">
      <div class="section-card-title">Change Password</div>
      <form id="pwForm">
        <div class="profile-grid">
          <div class="form-group"><label class="form-label">New Password</label><input type="password" class="form-input" id="newPassword" placeholder="At least 8 characters"></div>
          <div class="form-group"><label class="form-label">Confirm Password</label><input type="password" class="form-input" id="newPasswordConfirm" placeholder="Re-enter password"></div>
        </div>
        <button type="submit" class="btn-save" id="savePwBtn">Update Password</button>
        <div class="save-result" id="pwResult"></div>
      </form>
    </div>
  </div>
  <div class="mypage-section" id="tab-orders">
    <div class="section-card">
      <div class="section-card-title">Order History</div>
      <div class="orders-empty">
        <div class="orders-empty-icon"><img src="images/lion-emblem-symbol.png" alt="JOVE"></div>
        <p class="orders-empty-text">No orders yet.<br>Discover your first JOVE fragrance.</p>
        <a href="./#collection" class="orders-empty-cta">View Collection</a>
      </div>
    </div>
  </div>
  <div class="mypage-section" id="tab-address">
    <div class="section-card">
      <div class="section-card-title">Shipping Addresses</div>
      <div class="address-empty" id="addressList">
        <p>No saved addresses.</p>
        <button class="btn-add-address" id="addAddressBtn">Add Address</button>
      </div>
    </div>
  </div>
  <div class="logout-section">
    <button class="btn-logout" id="logoutBtn">Sign Out</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script>
document.querySelectorAll('.mypage-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.mypage-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.mypage-section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});
async function loadProfile() {
  const user = await JoveAuth.requireAuth();
  if (!user) return;
  document.getElementById('greeting').textContent = 'Welcome, ' + (user.user_metadata?.full_name || 'Member');
  document.getElementById('profileName').value = user.user_metadata?.full_name || '';
  document.getElementById('profileEmail').value = user.email || '';
  document.getElementById('profilePhone').value = user.user_metadata?.phone || '';
  document.getElementById('profileBirth').value = user.user_metadata?.birth_date || '';
}
document.getElementById('profileForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('saveProfileBtn'); const result = document.getElementById('saveResult');
  btn.textContent = 'Saving...'; btn.classList.add('loading');
  const { error } = await JoveAuth.updateProfile({ full_name: document.getElementById('profileName').value.trim(), phone: document.getElementById('profilePhone').value.trim(), birth_date: document.getElementById('profileBirth').value });
  btn.textContent = 'Save Changes'; btn.classList.remove('loading');
  if (error) { result.textContent = error.message; result.className = 'save-result error'; }
  else { result.textContent = '✦ Changes saved.'; result.className = 'save-result success'; setTimeout(() => result.textContent = '', 3000); }
});
document.getElementById('pwForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('savePwBtn'); const result = document.getElementById('pwResult');
  const pw = document.getElementById('newPassword').value; const confirm = document.getElementById('newPasswordConfirm').value;
  if (pw.length < 8) { result.textContent = 'Password must be at least 8 characters.'; result.className = 'save-result error'; return; }
  if (pw !== confirm) { result.textContent = 'Passwords do not match.'; result.className = 'save-result error'; return; }
  btn.textContent = 'Updating...'; btn.classList.add('loading');
  const { error } = await JoveAuth.updatePassword(pw);
  btn.textContent = 'Update Password'; btn.classList.remove('loading');
  if (error) { result.textContent = error.message; result.className = 'save-result error'; }
  else { result.textContent = '✦ Password updated.'; result.className = 'save-result success'; document.getElementById('newPassword').value = ''; document.getElementById('newPasswordConfirm').value = ''; }
});
// Address management
let addressEditMode = false;
document.getElementById('addAddressBtn').addEventListener('click', () => showAddressForm());

function showAddressForm(existing) {
  const container = document.getElementById('addressList');
  container.innerHTML = `
    <form id="addressForm" style="text-align:left">
      <div style="display:grid;gap:1rem;grid-template-columns:1fr 1fr">
        <div><label class="form-label">Label</label><input type="text" class="form-input" id="addrLabel" placeholder="Home, Office..." value="${existing?.label||''}"></div>
        <div><label class="form-label">Recipient</label><input type="text" class="form-input" id="addrName" placeholder="Full name" value="${existing?.name||''}"></div>
      </div>
      <div style="margin-top:1rem"><label class="form-label">Address</label><input type="text" class="form-input" id="addrLine1" placeholder="Street address" value="${existing?.line1||''}"></div>
      <div style="margin-top:1rem"><input type="text" class="form-input" id="addrLine2" placeholder="Apt, suite, etc. (optional)" value="${existing?.line2||''}"></div>
      <div style="display:grid;gap:1rem;grid-template-columns:1fr 1fr;margin-top:1rem">
        <div><label class="form-label">City</label><input type="text" class="form-input" id="addrCity" placeholder="City" value="${existing?.city||''}"></div>
        <div><label class="form-label">Postal Code</label><input type="text" class="form-input" id="addrZip" placeholder="Postal code" value="${existing?.zip||''}"></div>
      </div>
      <div style="display:grid;gap:1rem;grid-template-columns:1fr 1fr;margin-top:1rem">
        <div><label class="form-label">Country</label><input type="text" class="form-input" id="addrCountry" placeholder="Country" value="${existing?.country||''}"></div>
        <div><label class="form-label">Phone</label><input type="tel" class="form-input" id="addrPhone" placeholder="Phone number" value="${existing?.phone||''}"></div>
      </div>
      <div style="display:flex;gap:0.8rem;margin-top:1.5rem">
        <button type="submit" class="btn-save">Save Address</button>
        <button type="button" class="btn-add-address" onclick="loadAddresses()">Cancel</button>
      </div>
      <div class="save-result" id="addrResult"></div>
    </form>
  `;
  document.getElementById('addressForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const addr = {
      label: document.getElementById('addrLabel').value.trim(),
      name: document.getElementById('addrName').value.trim(),
      line1: document.getElementById('addrLine1').value.trim(),
      line2: document.getElementById('addrLine2').value.trim(),
      city: document.getElementById('addrCity').value.trim(),
      zip: document.getElementById('addrZip').value.trim(),
      country: document.getElementById('addrCountry').value.trim(),
      phone: document.getElementById('addrPhone').value.trim()
    };
    if (!addr.name || !addr.line1 || !addr.city) {
      document.getElementById('addrResult').textContent = 'Please fill in required fields.';
      document.getElementById('addrResult').className = 'save-result error';
      return;
    }
    const user = await JoveAuth.getUser();
    if (!user) return;
    // Save to user metadata
    const addresses = user.user_metadata?.addresses || [];
    if (existing?.index !== undefined) addresses[existing.index] = addr;
    else addresses.push(addr);
    const { error } = await JoveAuth.updateProfile({ addresses });
    if (error) { document.getElementById('addrResult').textContent = error.message; document.getElementById('addrResult').className = 'save-result error'; }
    else loadAddresses();
  });
}

async function loadAddresses() {
  const user = await JoveAuth.getUser();
  if (!user) return;
  const addresses = user.user_metadata?.addresses || [];
  const container = document.getElementById('addressList');
  if (addresses.length === 0) {
    container.innerHTML = '<p>No saved addresses.</p><button class="btn-add-address" onclick="showAddressForm()">Add Address</button>';
    return;
  }
  container.innerHTML = addresses.map((a, i) => `
    <div style="border:1px solid var(--border);padding:1.25rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-size:0.7rem;letter-spacing:0.1em;color:var(--gold);text-transform:uppercase;margin-bottom:0.5rem">${a.label || 'Address ' + (i+1)}</div>
        <div style="color:var(--fg);font-size:0.85rem">${a.name}</div>
        <div style="font-size:0.8rem">${a.line1}${a.line2 ? ', ' + a.line2 : ''}</div>
        <div style="font-size:0.8rem">${a.city} ${a.zip}</div>
        <div style="font-size:0.8rem">${a.country}</div>
        ${a.phone ? '<div style="font-size:0.8rem;margin-top:0.3rem">' + a.phone + '</div>' : ''}
      </div>
      <div style="display:flex;gap:0.5rem">
        <button onclick="showAddressForm({...${JSON.stringify(a).replace(/"/g,'&quot;')}, index:${i}})" style="background:none;border:none;color:var(--muted);font-size:0.65rem;cursor:pointer;letter-spacing:0.1em">EDIT</button>
        <button onclick="deleteAddress(${i})" style="background:none;border:none;color:var(--danger);font-size:0.65rem;cursor:pointer;letter-spacing:0.1em">DELETE</button>
      </div>
    </div>
  `).join('') + '<button class="btn-add-address" onclick="showAddressForm()">Add Address</button>';
}

async function deleteAddress(index) {
  const user = await JoveAuth.getUser();
  if (!user) return;
  const addresses = user.user_metadata?.addresses || [];
  addresses.splice(index, 1);
  await JoveAuth.updateProfile({ addresses });
  loadAddresses();
}

// Make functions global
window.showAddressForm = showAddressForm;
window.loadAddresses = loadAddresses;
window.deleteAddress = deleteAddress;

document.getElementById('logoutBtn').addEventListener('click', async () => { await JoveAuth.signOut(); window.location.href = './'; });
loadProfile();
loadAddresses();
</script>
</body>
</html>
