<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOVE — Parfumeur</title>
<meta name="description" content="JOVE — A niche parfumerie born in Seoul. Sacred minimalism, captured in scent.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; overflow: hidden;
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0a0a0a; color: #dddad5;
  }

  /* Full-screen background */
  .gate-bg {
    position: fixed; inset: 0; z-index: 0;
  }
  .gate-bg img {
    width: 100%; height: 100%; object-fit: cover;
    opacity: 0.35; filter: brightness(0.6);
  }
  .gate-bg::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 20%, rgba(10,10,10,0.85) 70%);
  }

  /* Noise overlay */
  .noise {
    position: fixed; inset: 0; opacity: 0.025; pointer-events: none; z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px;
  }

  /* Gate layout */
  .gate {
    position: relative; z-index: 10;
    height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  /* Thin gold line above logo */
  .gate-line {
    width: 40px; height: 1px;
    background: linear-gradient(to right, transparent, rgba(196,169,106,0.5), transparent);
    margin-bottom: 2.5rem;
    opacity: 0; animation: fadeIn 2s ease 0.3s forwards;
  }

  /* Logo — single, clean */
  .gate-logo {
    margin-bottom: 1rem;
    opacity: 0; animation: fadeUp 2s ease 0.5s forwards;
  }
  .gate-logo img {
    height: clamp(50px, 8vw, 80px);
    filter: invert(1);
    filter: drop-shadow(0 0 40px rgba(196,169,106,0.08));
  }

  /* Tagline */
  .gate-tagline {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic; font-size: clamp(0.85rem, 1.8vw, 1.1rem);
    color: rgba(221,218,213,0.45);
    margin-bottom: 3.5rem; letter-spacing: 0.02em;
    opacity: 0; animation: fadeUp 2s ease 0.8s forwards;
  }

  /* Language prompt */
  .gate-prompt {
    font-size: 0.6rem; font-weight: 400;
    letter-spacing: 0.5em; text-transform: uppercase;
    color: rgba(196,169,106,0.35);
    margin-bottom: 1.5rem;
    opacity: 0; animation: fadeUp 1.5s ease 1.2s forwards;
  }

  /* Buttons */
  .gate-buttons {
    display: flex; gap: 1px;
    opacity: 0; animation: fadeUp 1.5s ease 1.5s forwards;
  }
  .gate-btn {
    padding: 0.9rem 3rem;
    background: transparent;
    border: 1px solid rgba(196,169,106,0.25);
    color: rgba(221,218,213,0.7);
    font-family: 'Inter', sans-serif;
    font-size: 0.65rem; font-weight: 400;
    letter-spacing: 0.3em; text-transform: uppercase;
    text-decoration: none; cursor: pointer;
    transition: all 0.5s ease;
  }
  .gate-btn:first-child { border-right: none; }
  .gate-btn:hover {
    background: rgba(196,169,106,0.08);
    border-color: rgba(196,169,106,0.4);
    color: #dddad5;
  }

  /* Bottom */
  .gate-bottom {
    position: fixed; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
    font-size: 0.4rem; letter-spacing: 0.5em;
    text-transform: uppercase; color: rgba(196,169,106,0.12);
    opacity: 0; animation: fadeIn 1.5s ease 2.2s forwards;
    white-space: nowrap;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @media (max-width: 500px) {
    .gate-btn { padding: 0.8rem 2.2rem; font-size: 0.6rem; letter-spacing: 0.25em; }
  }
</style>
</head>
<body>

<div class="gate-bg">
  <img src="assets/lovable/collection-flatlay.jpg" alt="">
</div>
<div class="noise"></div>

<div class="gate">
  <div class="gate-line"></div>
  <div class="gate-logo">
    <img src="assets/lovable/logo-jove.png" alt="JOVE">
  </div>
  <div class="gate-tagline">The Scent of Creation</div>
  <div class="gate-prompt">Select Region</div>
  <div class="gate-buttons">
    <a href="kr/" class="gate-btn">한국</a>
    <a href="en/" class="gate-btn">Global</a>
  </div>
</div>

<div class="gate-bottom">Niche Parfumerie · Seoul · Est. MMXXV</div>

</body>
</html>
