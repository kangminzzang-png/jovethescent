<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOVE — Parfumeur</title>
<meta name="description" content="JOVE — A niche parfumerie born in Seoul. Sacred minimalism, captured in scent.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; overflow: hidden;
    font-family: 'Inter', -apple-system, sans-serif;
    background: #080808; color: #dddad5;
  }

  /* Clean dark background — no image, pure atmosphere */
  .gate-bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 45%, rgba(196,169,106,0.03) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 50% 50%, rgba(20,18,14,1) 0%, #080808 100%);
  }

  .noise {
    position: fixed; inset: 0; opacity: 0.025; pointer-events: none; z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px;
  }

  .gate {
    position: relative; z-index: 10;
    height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 0 1.5rem;
  }

  /* Product — single, centered, dramatic */
  .gate-product {
    margin-bottom: 3rem;
    opacity: 0; animation: fadeScale 2.5s ease 0.3s forwards;
  }
  .gate-product img {
    height: clamp(200px, 38vh, 340px);
    width: auto; object-fit: contain;
    filter: drop-shadow(0 30px 80px rgba(0,0,0,0.6))
            drop-shadow(0 0 60px rgba(196,169,106,0.06));
  }

  /* Logo */
  .gate-logo {
    margin-bottom: 0.5rem;
    opacity: 0; animation: fadeUp 2s ease 0.8s forwards;
  }
  .gate-logo img {
    height: clamp(32px, 5vw, 48px);
    filter: invert(1) brightness(1.05);
    opacity: 0.9;
  }

  /* Tagline */
  .gate-tagline {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic; font-size: clamp(0.75rem, 1.5vw, 0.95rem);
    color: rgba(196,169,106,0.45);
    margin-bottom: 0.4rem; letter-spacing: 0.05em;
    opacity: 0; animation: fadeUp 2s ease 1s forwards;
  }

  .gate-descriptor {
    font-size: 0.5rem; font-weight: 300;
    letter-spacing: 0.4em; text-transform: uppercase;
    color: rgba(221,218,213,0.2);
    margin-bottom: 3.5rem;
    opacity: 0; animation: fadeUp 1.5s ease 1.2s forwards;
  }

  /* Region select */
  .gate-prompt {
    font-size: 0.5rem; font-weight: 400;
    letter-spacing: 0.5em; text-transform: uppercase;
    color: rgba(221,218,213,0.18);
    margin-bottom: 1rem;
    opacity: 0; animation: fadeUp 1.2s ease 1.5s forwards;
  }

  .gate-buttons {
    display: flex; gap: 0;
    opacity: 0; animation: fadeUp 1.2s ease 1.7s forwards;
  }
  .gate-btn {
    padding: 0.8rem 2.5rem;
    background: transparent;
    border: 1px solid rgba(196,169,106,0.15);
    color: rgba(221,218,213,0.55);
    font-family: 'Inter', sans-serif;
    font-size: 0.55rem; font-weight: 400;
    letter-spacing: 0.3em; text-transform: uppercase;
    text-decoration: none; cursor: pointer;
    transition: all 0.5s ease;
  }
  .gate-btn + .gate-btn { border-left: none; }
  .gate-btn:hover {
    background: rgba(196,169,106,0.06);
    border-color: rgba(196,169,106,0.3);
    color: rgba(221,218,213,0.85);
  }

  .gate-bottom {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    font-size: 0.35rem; letter-spacing: 0.5em;
    text-transform: uppercase; color: rgba(196,169,106,0.08);
    opacity: 0; animation: fadeIn 1.5s ease 2.5s forwards;
    white-space: nowrap;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeScale {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  @media (max-width: 500px) {
    .gate-btn { padding: 0.7rem 2rem; }
    .gate-product img { height: 180px; }
  }
</style>
</head>
<body>

<div class="gate-bg"></div>
<div class="noise"></div>

<div class="gate">
  <div class="gate-product">
    <img src="assets/lovable/product-hawa-box.png" alt="JOVE">
  </div>
  <div class="gate-logo">
    <img src="assets/lovable/logo-jove.png" alt="JOVE">
  </div>
  <div class="gate-tagline">The Scent of Creation</div>
  <div class="gate-descriptor">Niche Parfumerie · Seoul</div>
  <div class="gate-prompt">Select Region</div>
  <div class="gate-buttons">
    <a href="kr/" class="gate-btn">한국</a>
    <a href="en/" class="gate-btn">Global</a>
  </div>
</div>

<div class="gate-bottom">Est. MMXXVI</div>

</body>
</html>
