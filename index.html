<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOVE — Parfumeur</title>
<meta name="description" content="JOVE — A niche parfumerie born in Seoul. Sacred minimalism, captured in scent.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; overflow: hidden;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #060606; color: #dddad5;
  }

  /* Video background */
  .gate-bg {
    position: fixed; inset: 0; z-index: 0;
    background: #060606; overflow: hidden;
  }
  .gate-bg video {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center;
    opacity: 0.5;
  }
  .gate-bg::after {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    width: 250px; height: 120px;
    background: radial-gradient(ellipse at bottom right, #060606 50%, transparent 80%);
    z-index: 1;
  }

  .noise {
    position: fixed; inset: 0; opacity: 0.025; pointer-events: none; z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px;
  }

  .gate {
    position: relative; z-index: 10;
    height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 0 1.5rem;
  }

  /* Logo — the star */
  .gate-logo {
    margin-bottom: 1.5rem;
    opacity: 0; animation: fadeUp 2.5s ease 0.5s forwards;
  }
  .gate-logo img {
    height: clamp(60px, 10vw, 100px);
    filter: invert(1) brightness(1.1);
    opacity: 1;
  }

  /* Thin gold line */
  .gate-line {
    width: 40px; height: 1px;
    background: rgba(196,169,106,0.3);
    margin-bottom: 1.5rem;
    opacity: 0; animation: fadeIn 2s ease 1s forwards;
  }

  .gate-tagline {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic; font-weight: 300; font-size: clamp(0.85rem, 1.8vw, 1.1rem);
    color: rgba(196,169,106,0.5);
    margin-bottom: 0.3rem; letter-spacing: 0.05em;
    opacity: 0; animation: fadeUp 2s ease 1.2s forwards;
  }

  .gate-descriptor {
    font-size: 0.5rem; font-weight: 300;
    letter-spacing: 0.4em; text-transform: uppercase;
    color: rgba(221,218,213,0.18);
    margin-bottom: 4rem;
    opacity: 0; animation: fadeUp 1.5s ease 1.4s forwards;
  }

  .gate-prompt {
    font-size: 0.45rem; font-weight: 400;
    letter-spacing: 0.5em; text-transform: uppercase;
    color: rgba(221,218,213,0.15);
    margin-bottom: 1rem;
    opacity: 0; animation: fadeUp 1.2s ease 1.8s forwards;
  }

  .gate-buttons {
    display: flex; gap: 0;
    opacity: 0; animation: fadeUp 1.2s ease 2s forwards;
  }
  .gate-btn {
    padding: 0.8rem 2.5rem;
    background: transparent;
    border: 1px solid rgba(196,169,106,0.12);
    color: rgba(221,218,213,0.5);
    font-family: 'Pretendard', sans-serif;
    font-size: 0.55rem; font-weight: 400;
    letter-spacing: 0.3em; text-transform: uppercase;
    text-decoration: none; cursor: pointer;
    transition: all 0.6s ease;
  }
  .gate-btn + .gate-btn { border-left: none; }
  .gate-btn:hover {
    background: rgba(196,169,106,0.05);
    border-color: rgba(196,169,106,0.25);
    color: rgba(221,218,213,0.8);
  }

  .gate-bottom {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    font-size: 0.35rem; letter-spacing: 0.5em;
    text-transform: uppercase; color: rgba(196,169,106,0.06);
    opacity: 0; animation: fadeIn 1.5s ease 2.5s forwards;
    white-space: nowrap;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  @media (max-width: 500px) {
    .gate-btn { padding: 0.7rem 2rem; }
  }
</style>
</head>
<body>

<div class="gate-bg">
  <video src="assets/gate-intro.mp4" autoplay muted loop playsinline></video>
</div>
<div class="noise"></div>

<div class="gate">
  <div class="gate-logo">
    <img src="assets/lovable/logo-jove.png" alt="JOVE">
  </div>
  <div class="gate-line"></div>
  <div class="gate-tagline">The Scent of Creation</div>
  <div class="gate-descriptor">Niche Parfumerie · Seoul</div>
  <div class="gate-prompt">Select Region</div>
  <div class="gate-buttons">
    <a href="kr/" class="gate-btn">한국</a>
    <a href="en/" class="gate-btn">Global</a>
  </div>
</div>

<div class="gate-bottom">Est. MMXXVI</div>

</body>
</html>
